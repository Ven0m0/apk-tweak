---
name: Copilot Setup Steps

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          uv sync --extra dev

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies (pngquant, jpegoptim, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y pngquant jpegoptim ffmpeg
