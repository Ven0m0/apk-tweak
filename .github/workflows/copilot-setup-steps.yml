name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          with:
            enable-cache: true
            cache-dependency-glob: |
              uv.lock
              pyproject.toml

      - name: Install Python dependencies
        run: uv sync --all-extras --all-packages --all-groups --link-mode symlink --frozen 2>/dev/null || true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install system dependencies (pngquant, jpegoptim, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y pngquant jpegoptim ffmpeg
