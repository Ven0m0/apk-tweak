---
name: Copilot Setup Steps

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          uv sync --python 3.11 --extra dev

      - name: Install system dependencies (Java, pngquant, jpegoptim, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk pngquant jpegoptim ffmpeg
